<div class="background">

    <form #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)">

        <label>Nom de l'oiseau : </label>
        <input type="text" name="name" autocomplete="off" ngModel required>
        <label>Lieu : </label>
        <input type="text" name="location" autocomplete="off" ngModel required>
        <label>Date : </label>
        <input type="date" name="date" autocomplete="off" ngModel required>
        <label>Photo ou illustration : </label>
        <input type="file" (change)="onFileSelected($event)" name="urlImage" accept="image/*">


        <!-- Désactive le bouton si le formulaire n'est pas valide -->
        <button type="submit" [disabled]="!loginForm.valid">
            Noter dans le carnet
        </button>
    </form>


</div>
