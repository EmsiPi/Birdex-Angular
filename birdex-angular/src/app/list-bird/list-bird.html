<section id="slideshow">

    <button class="button-55" role="button" (click)="lastSlide()">
        < </button>

            <div class="carnet">
                <div class="slides-container" [style.transform]="'translateX(-' + currentIndex * 100 + '%)'">
                    @for (bird of birdService.birds(); track bird._id; let i = $index) {
                    <div class="slider">
                        <app-premier-composant [bird]="bird"></app-premier-composant>
                    </div>
                    } @empty {
                    <p>Aucun oiseau n'a été observé</p>
                    }
                </div>
            </div>

            <button class="button-55" role="button" (click)="nextSlide()"> > </button>
</section>

<br>
